name: DoVi

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black mypy

      - name: Run flake8 (PEP8 compliance)
        run: flake8 . --max-line-length=120 --statistics --exclude=venv,.venv,build,dist

      - name: Check code formatting with black
        run: black --check --line-length=120 .

      - name: Run mypy (type checking)
        run: mypy . --ignore-missing-imports --disable-error-code=attr-defined

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-security-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-security-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit

      - name: Run bandit (security vulnerability scanner)
        run: bandit -r main.py document_backend.py logger.py -ll

      - name: Install dependencies for pip-audit
        run: pip install -r requirements.txt

      - name: Run pip-audit (dependency vulnerability scanner)
        run: pip-audit

  test:
    name: Run Tests
    needs: lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start Xvfb and export DISPLAY
        run: |
          Xvfb :99 -screen 0 1024x768x16 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV

      - name: Run tests with pytest
        run: python -m pytest -v --maxfail=1 --tb=short