name: CI — audit, lint, tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pip-audit (runtime deps)
        run: |
          python -m pip install pip-audit
          python -m pip_audit --format=json > results/pip_audit_prod.json || true
        continue-on-error: true

      - name: Upload pip-audit artifact
        uses: actions/upload-artifact@v4
        with:
          name: pip_audit_prod
          path: results/pip_audit_prod.json

      - name: Install dev dependencies
        run: |
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Lint (ruff)
        run: |
          python -m pip install ruff
          ruff check . || true

      - name: Lint (flake8)
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 . --max-line-length=120 || true; fi

      - name: Run headless tests
        env:
          HEADLESS: '1'
        run: |
          pytest -q --maxfail=1 || exit 1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: .

